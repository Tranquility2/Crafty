<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <title>Crafty</title>
    <meta name="description" content="Create factorio like recipe">
    <meta name="author" content="Roy Moore">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="recipe-section">
        <div class="recipe-top-row">
            <div class="section-header">
                <p>Recipe</p>
            </div>
            <button id="scaleMainArea">1x</button>
        </div>
        <div id="main_area">
            <div class="button-column">
                <button class="AddIcon" onclick="AddIcon(IconType.Input)" title="Add input">+</button>
                <button class="RemoveIcon" onclick="RemoveIcon(IconType.Input)" title="Remove input">−</button>
            </div>
            <div id="scale_area">
                <div id="build_area"></div>
            </div>
            <div class="button-column">
                <button class="AddIcon" onclick="AddIcon(IconType.Output)" title="Add output">+</button>
                <button class="RemoveIcon" onclick="RemoveIcon(IconType.Output)" title="Remove output">−</button>
            </div>
        </div>
    </div>

    <div id="editFrame" style="display: none;">
        <div class="edit-row">
            <label for="imageUrl">Image URL</label>
            <input type="text" id="imageUrl">
        </div>
        <div class="edit-row">
            <label for="imageFile">Upload Image</label>
            <input type="file" id="imageFile" accept="image/*" onchange="imageFile(event)">
        </div>
        <div class="edit-row">
            <label for="emoji">Emoji</label>
            <div class="edit-inline">
                <input type="text" id="emoji" maxlength="8" size="4" placeholder="e.g. 🐛">
                <button type="button" id="emojiPickerToggle" title="Pick emoji">😀</button>
            </div>
        </div>
        <div id="emojiPickerWrapper" style="display:none;">
            <emoji-picker></emoji-picker>
        </div>
        <div class="edit-row">
            <label for="count">Count</label>
            <input type="number" id="count" min="1">
        </div>
        <div class="edit-actions">
            <button id="updateIcon" class="primary">Update</button>
            <button id="initIcon">Init</button>
        </div>
    </div>

    <div id="resultFrame">
        <div class="result-actions">
            <button id="generateImage">Preview Image</button>
            <button id="saveImage" class="primary">Save Image</button>
        </div>
        <div class="preview-panel">
            <div class="preview-label">Preview</div>
            <img id="resultImage">
        </div>
    </div>

    <footer>
        <div>
            <span id="version"></span>
            <span id="disclaimer">
                Unofficial fan tool, not affiliated with Wube Software.
                Images are provided by the user; you are responsible for
                ensuring you have the right to use them.
                <a href="https://github.com/Tranquility2/Crafty#disclaimer" target="_blank">More info</a>.
            </span>
        </div>

        <a href="https://github.com/Tranquility2/Crafty" target="_blank">
            <img src="https://img.shields.io/badge/github-%23121011.svg?style=for-the-badge&logo=github&logoColor=white"
                alt="GitHub">
        </a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script src="script.js"></script>
</body>

</html>
